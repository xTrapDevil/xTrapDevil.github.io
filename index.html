<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Workout Logger</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        .container { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 500px; 
        }

        h1 { 
            text-align: center; 
            margin-top: 0; 
            font-size: 2rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; 
        }

        .input-group, .auth-buttons { display: flex; gap: 10px; }
        form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            background-color: #2c2c2c; 
            color: #ffffff;
            border: 1px solid #3d3d3d; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: border-color 0.3s;
            margin-bottom: 10px;
        }
        input:focus { outline: none; border-color: #4facfe; }

        button { 
            width: 100%;
            padding: 14px; 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #121212; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 800; 
            text-transform: uppercase;
            transition: transform 0.2s; 
        }
        button:hover { transform: translateY(-2px); }
        
        .secondary-btn { background: #2c2c2c; color: #4facfe; border: 1px solid #4facfe; }

        h2 { font-size: 1.2rem; color: #ffffff; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        
        #workout-list { list-style: none; padding: 0; margin: 0; }
        .workout-card { background: #252525; border-left: 5px solid #00f2fe; margin-bottom: 15px; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .workout-info strong { display: block; font-size: 1.2rem; color: #ffffff; margin-bottom: 4px; }
        .workout-info span { color: #aaaaaa; font-size: 0.95rem; }
        
        .delete-btn { background: #ff4b4b; color: white; padding: 8px 14px; font-size: 12px; border-radius: 6px; font-weight: bold; width: auto; text-transform: none; }
        .delete-btn:hover { background: #ff1c1c; }

        /* Hide app initially */
        #app-container { display: none; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logout-btn { background: transparent; color: #ff4b4b; width: auto; padding: 5px 10px; font-size: 14px; text-transform: none; border: 1px solid #ff4b4b; }
        
        .error-msg { color: #ff4b4b; text-align: center; font-size: 14px; margin-top: -10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="auth-container">
        <h1>Welcome</h1>
        <p style="text-align: center; color: #aaa; margin-bottom: 20px;">Sign in to view your workouts</p>
        
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="password" id="password" placeholder="Password" required>
        <div id="auth-error" class="error-msg"></div>

        <div class="auth-buttons">
            <button id="login-btn">Log In</button>
            <button id="signup-btn" class="secondary-btn">Sign Up</button>
        </div>
    </div>

    <div id="app-container">
        <div class="header-bar">
            <h1 style="margin: 0; font-size: 1.5rem;">Log Workout</h1>
            <button id="logout-btn" class="logout-btn">Log Out</button>
        </div>
        
        <form id="workout-form">
            <input type="text" id="exercise" placeholder="Exercise (e.g., Bench Press)" required>
            
            <div class="input-group">
                <input type="number" id="sets" placeholder="Sets" min="1" required>
                <input type="number" id="reps" placeholder="Reps" min="1" required>
                <input type="number" id="weight" placeholder="Weight" min="0" required>
            </div>
            
            <button type="submit" id="submit-btn">Log It</button>
        </form>

        <h2>My Activity</h2>
        <div id="loading-message" style="text-align:center; color:#4facfe;">Syncing...</div>
        <ul id="workout-list"></ul>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
    // 1. Import new Auth functions
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // 🛑 PASTE YOUR FIREBASE CONFIG KEYS HERE 🛑
    const firebaseConfig = {
      apiKey: "AIzaSyA4c734ECv-7uwbIbMQsnS3id68H-R4iOs",
      authDomain: "my-workout-logger-b0708.firebaseapp.com",
      projectId: "my-workout-logger-b0708",
      storageBucket: "my-workout-logger-b0708.firebasestorage.app",
      messagingSenderId: "764803594023",
      appId: "1:764803594023:web:63960dbbacb1bc4a7d1b02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app); // Initialize Auth

    // UI Elements
    const authContainer = document.getElementById('auth-container');
    const appContainer = document.getElementById('app-container');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const authError = document.getElementById('auth-error');
    const workoutList = document.getElementById('workout-list');
    const loadingMessage = document.getElementById('loading-message');

    let currentUser = null; // Keeps track of who is logged in

    // --- AUTHENTICATION LOGIC ---

    // Listen for login/logout changes
    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            authContainer.style.display = "none";
            appContainer.style.display = "block";
            fetchAndDisplayWorkouts(); // Fetch only this user's data
        } else {
            currentUser = null;
            authContainer.style.display = "block";
            appContainer.style.display = "none";
        }
    });

    // Sign Up
    document.getElementById('signup-btn').addEventListener('click', async () => {
        try {
            await createUserWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            authError.innerText = "";
        } catch (error) {
            authError.innerText = error.message.replace("Firebase: ", "");
        }
    });

    // Log In
    document.getElementById('login-btn').addEventListener('click', async () => {
        try {
            await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            authError.innerText = "";
        } catch (error) {
            authError.innerText = "Invalid email or password.";
        }
    });

    // Log Out
    document.getElementById('logout-btn').addEventListener('click', async () => {
        await signOut(auth);
        emailInput.value = "";
        passwordInput.value = "";
    });

    // --- WORKOUT LOGIC ---

    document.getElementById('workout-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        if (!currentUser) return;

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "Saving...";
        submitBtn.disabled = true;

        const workout = {
            exercise: document.getElementById('exercise').value,
            sets: document.getElementById('sets').value,
            reps: document.getElementById('reps').value,
            weight: document.getElementById('weight').value,
            date: new Date().toLocaleDateString(),
            timestamp: Date.now(),
            userId: currentUser.uid // IMPORTANT: Tag the workout with this user's ID
        };

        try {
            await addDoc(collection(db, "workouts"), workout);
            document.getElementById('workout-form').reset();
            await fetchAndDisplayWorkouts();
        } catch (error) {
            console.error("Error adding document: ", error);
        } finally {
            submitBtn.innerText = "Log It";
            submitBtn.disabled = false;
        }
    });

    async function fetchAndDisplayWorkouts() {
        if (!currentUser) return;
        workoutList.innerHTML = '';
        loadingMessage.style.display = 'block';

        try {
            // IMPORTANT: Only get workouts where userId matches the logged-in user
            const q = query(
                collection(db, "workouts"), 
                where("userId", "==", currentUser.uid), 
                orderBy("timestamp", "desc")
            );
            const querySnapshot = await getDocs(q);
            
            loadingMessage.style.display = 'none';

            querySnapshot.forEach((docSnap) => {
                const workout = docSnap.data();
                const docId = docSnap.id; 
                
                const li = document.createElement('li');
                li.className = 'workout-card';
                li.innerHTML = `
                    <div class="workout-info">
                        <strong>${workout.exercise}</strong>
                        <span>${workout.sets} sets × ${workout.reps} reps @ ${workout.weight}</span>
                    </div>
                    <button class="delete-btn" data-id="${docId}">Delete</button>
                `;
                workoutList.appendChild(li);
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idToDelete = e.target.getAttribute('data-id');
                    await deleteDoc(doc(db, "workouts", idToDelete));
                    fetchAndDisplayWorkouts();
                });
            });

        } catch (error) {
            console.error("Error getting documents: ", error);
            loadingMessage.innerText = "Note: Database might need an index. Check the console.";
        }
    }
</script>

</body>
</html>
