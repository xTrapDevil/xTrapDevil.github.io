<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Workout Logger</title>
    <style>
        /* Modern, Dark Mode Fitness Theme */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        .container { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 500px; 
        }

        h1 { 
            text-align: center; 
            margin-top: 0; 
            font-size: 2rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; 
        }

        form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px; }
        .input-group { display: flex; gap: 10px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            background-color: #2c2c2c; 
            color: #ffffff;
            border: 1px solid #3d3d3d; 
            border-radius: 8px; 
            font-size: 16px; 
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input::placeholder { color: #888; }
        
        input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
        }

        button { 
            padding: 14px; 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #121212; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: 800; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.2s, box-shadow 0.2s; 
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        button:active { transform: translateY(0); }
        button:disabled { background: #555; color: #888; cursor: not-allowed; box-shadow: none; transform: none; }

        h2 { 
            font-size: 1.2rem; 
            color: #ffffff;
            border-bottom: 2px solid #333; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
        }

        #workout-list { list-style: none; padding: 0; margin: 0; }
        
        .workout-card { 
            background: #252525; 
            border-left: 5px solid #00f2fe; 
            margin-bottom: 15px; 
            padding: 15px 20px; 
            border-radius: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .workout-card:hover { transform: translateX(4px); }

        .workout-info strong { 
            display: block; 
            font-size: 1.2rem; 
            color: #ffffff;
            margin-bottom: 4px; 
        }

        .workout-info span { color: #aaaaaa; font-size: 0.95rem; }
        
        .delete-btn { 
            background: #ff4b4b; 
            color: white;
            padding: 8px 14px; 
            font-size: 12px; 
            border-radius: 6px;
            font-weight: bold;
            text-transform: none;
            letter-spacing: normal;
        }

        .delete-btn:hover { 
            background: #ff1c1c; 
            box-shadow: 0 4px 12px rgba(255, 75, 75, 0.4);
        }

        .loading { text-align: center; color: #4facfe; font-style: italic; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Log Workout</h1>
    
    <form id="workout-form">
        <input type="text" id="exercise" placeholder="Exercise (e.g., Bench Press)" required>
        
        <div class="input-group">
            <input type="number" id="sets" placeholder="Sets" min="1" required>
            <input type="number" id="reps" placeholder="Reps" min="1" required>
            <input type="number" id="weight" placeholder="Weight (lbs/kg)" min="0" required>
        </div>
        
        <button type="submit" id="submit-btn">Log It</button>
    </form>

    <h2>Recent Activity</h2>
    <div id="loading-message" class="loading">Syncing with cloud...</div>
    <ul id="workout-list">
        </ul>
</div>

<script type="module">
    // 1. Import Firebase functions directly from the cloud CDN
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // 2. Your specific Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyA4c734ECv-7uwbIbMQsnS3id68H-R4iOs",
      authDomain: "my-workout-logger-b0708.firebaseapp.com",
      projectId: "my-workout-logger-b0708",
      storageBucket: "my-workout-logger-b0708.firebasestorage.app",
      messagingSenderId: "764803594023",
      appId: "1:764803594023:web:63960dbbacb1bc4a7d1b02",
      measurementId: "G-YPR1GP6L5Q"
    };

    // 3. Initialize Firebase, Analytics, and Firestore
    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // DOM Elements
    const workoutForm = document.getElementById('workout-form');
    const workoutList = document.getElementById('workout-list');
    const loadingMessage = document.getElementById('loading-message');
    const submitBtn = document.getElementById('submit-btn');

    // Load workouts when the page starts
    document.addEventListener('DOMContentLoaded', fetchAndDisplayWorkouts);

    // Handle Form Submission
    workoutForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        submitBtn.innerText = "Saving...";
        submitBtn.disabled = true;

        const workout = {
            exercise: document.getElementById('exercise').value,
            sets: document.getElementById('sets').value,
            reps: document.getElementById('reps').value,
            weight: document.getElementById('weight').value,
            date: new Date().toLocaleDateString(),
            timestamp: Date.now() 
        };

        try {
            await addDoc(collection(db, "workouts"), workout);
            workoutForm.reset();
            await fetchAndDisplayWorkouts();
        } catch (error) {
            console.error("Error adding document: ", error);
            alert("Failed to save workout. Ensure your Firestore Database is in 'Test Mode'.");
        } finally {
            submitBtn.innerText = "Log It";
            submitBtn.disabled = false;
        }
    });

    // Fetch from Firestore and Display
    async function fetchAndDisplayWorkouts() {
        workoutList.innerHTML = '';
        loadingMessage.style.display = 'block';

        try {
            const q = query(collection(db, "workouts"), orderBy("timestamp", "desc"));
            const querySnapshot = await getDocs(q);
            
            loadingMessage.style.display = 'none';

            querySnapshot.forEach((docSnap) => {
                const workout = docSnap.data();
                const docId = docSnap.id; 
                
                const li = document.createElement('li');
                li.className = 'workout-card';
                li.innerHTML = `
                    <div class="workout-info">
                        <strong>${workout.exercise}</strong>
                        <span>${workout.sets} sets × ${workout.reps} reps @ ${workout.weight} | ${workout.date}</span>
                    </div>
                    <button class="delete-btn" data-id="${docId}">Delete</button>
                `;
                workoutList.appendChild(li);
            });

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const idToDelete = e.target.getAttribute('data-id');
                    await removeWorkout(idToDelete);
                });
            });

        } catch (error) {
            console.error("Error getting documents: ", error);
            loadingMessage.innerText = "Error loading workouts. Did you create the Firestore database?";
        }
    }

    // Delete from Firestore
    async function removeWorkout(id) {
        try {
            await deleteDoc(doc(db, "workouts", id));
            fetchAndDisplayWorkouts(); 
        } catch (error) {
            console.error("Error deleting document: ", error);
        }
    }
</script>

</body>
</html>
